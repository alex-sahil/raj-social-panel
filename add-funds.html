<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - Raj Social Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .fund-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .qr-section {
            text-align: center;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .qr-placeholder {
            width: 180px;
            height: 180px;
            background: #fff;
            margin: 0 auto 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            font-weight: 700;
            font-size: 14px;
            border: 4px solid #38bdf8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .custom-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .custom-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
        }

        .btn-pay {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="navbar">
        <a href="dashboard.html" class="logo" style="text-decoration: none; font-size: 20px; font-weight: 800; color: #38bdf8;">
            <i class="fa-solid fa-rocket"></i> Raj Social Panel
        </a>
        <a href="dashboard.html" style="color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600;">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </nav>

    <!-- Main Container -->
    <div class="container">
        
        <div class="fund-card">
            <h2 style="font-size: 22px; margin-bottom: 10px; color: #38bdf8; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-wallet"></i> Add Funds to Account
            </h2>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Scan the QR code below or pay via UPI, then submit your transaction details.</p>

            <!-- QR Code Section -->
            <div class="qr-section">
                <!-- এখানে তুমি তোমার আসল QR Code ইমেজ বা লিংক দিতে পারো -->
                <div class="qr-placeholder">
                    <i class="fa-solid fa-qrcode" style="font-size: 60px; color: #020617;"></i>
                </div>
                <p style="font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 5px;">UPI ID: <span style="color: #38bdf8;">yourname@upi</span></p>
                <p style="font-size: 13px; color: #94a3b8;">Scan with GPay, PhonePe, Paytm or any UPI App</p>
            </div>

            <!-- Payment Form -->
            <form id="addFundForm">
                <div class="form-group">
                    <label>Amount Added (₹)</label>
                    <input type="number" id="fundAmount" class="custom-input" placeholder="e.g. 500" min="10" required>
                </div>

                <div class="form-group">
                    <label>Transaction ID / UPI Ref No.</label>
                    <input type="text" id="txnId" class="custom-input" placeholder="Enter 12-digit UPI Transaction ID" required>
                </div>

                <button type="submit" class="btn-pay">Submit Payment Request <i class="fa-solid fa-check-circle" style="margin-left: 6px;"></i></button>
            </form>
        </div>

    </div>

    <!-- Script -->
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById('addFundForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = document.getElementById('fundAmount').value;
            const txnId = document.getElementById('txnId').value;

            if (!currentUser) {
                alert("Please login first!");
                return;
            }

            try {
                // Save payment request to Firestore
                await addDoc(collection(db, "fund_requests"), {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: parseFloat(amount),
                    txnId: txnId,
                    status: "Pending",
                    createdAt: new Date()
                });

                alert("পেমেন্ট রিকোয়েস্ট সফলভাবে জমা হয়েছে! অ্যাডমিন চেক করে ব্যালেন্স যোগ করে দেবেন।");
                document.getElementById('addFundForm').reset();
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
