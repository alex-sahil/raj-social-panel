<!-- Add New Service Section in admin.html -->
<div class="admin-section">
    <h2 class="section-title">➕ Add New Service</h2>
    <form id="addServiceForm">
        <div class="form-grid">
            <input type="text" id="serviceCategory" class="input-box" placeholder="Category (e.g., Instagram Followers)" required>
            <input type="text" id="serviceName" class="input-box" placeholder="Service Name (e.g., 2720 Instagram Followers)" required>
            <input type="number" id="serviceRate" class="input-box" step="0.01" placeholder="Rate per 1000 (₹)" required>
            <input type="number" id="serviceMin" class="input-box" placeholder="Min Order (100)" required>
            <input type="number" id="serviceMax" class="input-box" placeholder="Max Order (1000000)" required>
            <input type="text" id="serviceAvgTime" class="input-box" placeholder="Average Time (e.g., 41 minutes)" required>
        </div>
        
        <div style="margin-top: 10px;">
            <label style="display:block; font-size:13px; color:#94a3b8; margin-bottom:5px;">Service Description / Details:</label>
            <textarea id="serviceDesc" class="input-box" style="height: 100px; width:100%; resize:vertical;" placeholder="- Link: Instagram Username&#10;- Quality: 100% Real Indian Accounts&#10;- Drop: 0% Non Drop&#10;- Speed: Day 100K" required></textarea>
        </div>

        <button type="submit" class="btn-admin" style="margin-top: 10px;">Add Service</button>
    </form>
</div>
