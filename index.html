<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Social Panel - MD ROCKY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            font-size: 28px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Raj Social Panel</h1>
        <p class="subtitle">Best & Fast Social Media Growth Services</p>

        <form id="orderForm">
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                    <option>Facebook Services</option>
                    <option>Instagram Followers & Likes</option>
                    <option>YouTube Subscribers & Views</option>
                    <option>TikTok Growth Services</option>
                </select>
            </div>

            <div class="form-group">
                <label for="service">Choose Service</label>
                <select id="service">
                    <option>1,000 High Quality Followers</option>
                    <option>5,000 High Quality Followers</option>
                    <option>1,000 Real Likes</option>
                    <option>10,000 Views Package</option>
                </select>
            </div>

            <div class="form-group">
                <label for="link">Target Link / Profile URL</label>
                <input type="text" id="link" placeholder="Paste your link here..." required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" placeholder="1000" min="100" required>
            </div>

            <button type="submit" class="btn-submit">Submit Order</button>
        </form>

        <p class="footer-text">Powered by MD ROCKY | All Rights Reserved</p>
    </div>

            measurementId: "G-39JTY197F7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        console.log("Firebase initialized successfully!");
    </script>

</body>
</html>
