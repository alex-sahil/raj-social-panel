<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Social Panel - Premium SMM Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .hero-header {
            text-align: center;
            padding: 30px 20px 10px;
            max-width: 700px;
            margin: 0 auto;
        }
        .main-title {
            font-size: 30px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .desc-text {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }
        .auth-card-wrapper {
            max-width: 440px;
            width: 90%;
            margin: 15px auto 40px;
        }
        .custom-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .tab-group {
            display: flex;
            background: rgba(2, 6, 23, 0.6);
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #38bdf8;
            color: #020617;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        .form-box {
            display: none;
        }
        .form-box.active {
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .custom-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .custom-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
            margin: 15px 0;
        }
        .checkbox-group a {
            color: #38bdf8;
            text-decoration: none;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .btn-google {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-google:hover {
            background: #1d4ed8;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin: 18px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .remember-row a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 18px 8%;">
        <a href="index.html" class="logo" style="text-decoration: none; font-size: 20px; font-weight: 800; color: #38bdf8;">
            <i class="fa-solid fa-rocket"></i> Raj Social Panel
        </a>
        <a href="https://t.me/RajSocialPanel" target="_blank" style="background: #0088cc; color: white; padding: 8px 16px; border-radius: 50px; text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;">
            <i class="fa-brands fa-telegram"></i> Join Telegram
        </a>
    </nav>

    <!-- MAIN HERO SECTION -->
    <section id="home">
        <div class="hero-header">
            <h1 class="main-title" id="headerTitle">RAJ SOCIAL PANEL</h1>
            <p class="desc-text" id="headerSub">🔥 Fast • 💰 Affordable • 🔐 Secure SMM Services • ⚡ Trusted 💯</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card-wrapper">
            <div class="custom-card">
                
                <!-- Tab Switcher -->
                <div class="tab-group">
                    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                    <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
                </div>

                <!-- Login Form (Email or Username Support) -->
                <form id="loginForm" class="form-box active">
                    <div class="input-group">
                        <label>Email or Username</label>
                        <input type="text" id="loginEmail" class="custom-input" placeholder="Enter email or username" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" class="custom-input" placeholder="Enter password" required>
                    </div>

                    <div class="remember-row">
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                            <input type="checkbox" style="accent-color: #38bdf8;"> Remember me
                        </label>
                        <a href="#" onclick="switchTab('forgot')">Password Lost?</a>
                    </div>

                    <button type="submit" class="btn-submit">Sign In</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="form-box">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="regName" class="custom-input" placeholder="Enter username" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" class="custom-input" placeholder="Enter email" required>
                    </div>

                    <div class="input-group">
                        <label>Whatsapp No.</label>
                        <input type="tel" id="regWhatsapp" class="custom-input" placeholder="Enter whatsapp no." required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" class="custom-input" placeholder="Enter password" required>
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regConfirmPassword" class="custom-input" placeholder="Confirm password" required>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="termsCheck" style="accent-color: #38bdf8;" required>
                        <label for="termsCheck">I have read and agreed with <a href="#">Terms of Service</a></label>
                    </div>

                    <button type="submit" class="btn-submit">Sign Up</button>

                    <div style="text-align: center; margin-top: 15px; font-size: 14px; color: #94a3b8;">
                        Already have an account? <a href="#" onclick="switchTab('login')" style="color: #38bdf8; text-decoration: none; font-weight: 600;">Sign In</a>
                    </div>
                </form>

                <!-- Forgot Password Form -->
                <form id="forgotForm" class="form-box">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="forgotEmail" class="custom-input" placeholder="name@example.com" required>
                    </div>
                    <button type="submit" class="btn-submit">Send Reset Link</button>
                    <div style="text-align: center; margin-top: 15px;">
                        <a href="#" onclick="switchTab('login')" style="color: #94a3b8; font-size: 13px; text-decoration: none;">Back to Sign In</a>
                    </div>
                </form>

                <div class="divider">OR</div>

                <!-- Google Sign-In Button -->
                <button type="button" id="googleLoginBtn" class="btn-google">
                    <i class="fa-brands fa-google" style="font-size: 16px;"></i> Signin with Google
                </button>

            </div>
        </div>
    </section>

    <!-- Floating WhatsApp Direct Inbox Button -->
    <a href="https://wa.me/919337028344" target="_blank" style="position: fixed; bottom: 25px; right: 25px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); text-decoration: none; z-index: 1000;">
        <i class="fa-brands fa-whatsapp" style="font-size: 22px;"></i> HELP
    </a>

    <!-- Tab Switching JS -->
    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-box').forEach(form => form.classList.remove('active'));

            const headerTitle = document.getElementById('headerTitle');
            const headerSub = document.getElementById('headerSub');

            if(tabName === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                headerTitle.innerText = "RAJ SOCIAL PANEL";
                headerSub.style.display = "block";
            } else if(tabName === 'register') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                headerTitle.innerText = "🚀 Join Raj Social Panel";
                headerSub.style.display = "block";
            } else if(tabName === 'forgot') {
                document.getElementById('forgotForm').classList.add('active');
                headerTitle.innerText = "Reset Password";
                headerSub.style.display = "none";
            }
        }
    </script>

    <!-- Connect Firebase Logic -->
    <script type="module" src="app.js"></script>

</body>
</html>
