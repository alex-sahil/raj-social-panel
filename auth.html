<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Raj Social Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 60px auto;
            text-align: center;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 18px;
            font-weight: 600;
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: var(--primary-cyan);
            border-bottom: 2px solid var(--primary-cyan);
        }
        .form-box {
            display: none;
            margin-top: 25px;
            text-align: left;
        }
        .form-box.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <i class="fa-solid fa-rocket"></i> Raj Social Panel
        </a>
        <div>
            <a href="index.html" class="btn" style="color: var(--text-sub);">Home</a>
        </div>
    </nav>

    <!-- Auth Card -->
    <div class="auth-container">
        <div class="glass-card">
            <!-- Tabs -->
            <div style="display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--border-color);">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="form-box active">
                <h3 style="margin-bottom: 15px; color: var(--primary-cyan);">Welcome Back</h3>
                <div>
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="enter your email" required>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <div style="text-align: right; margin-bottom: 15px;">
                    <a href="#" onclick="switchTab('forgot')" style="color: var(--primary-cyan); font-size: 13px; text-decoration: none;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Dashboard</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="form-box">
                <h3 style="margin-bottom: 15px; color: var(--primary-cyan);">Create Account</h3>
                <div>
                    <label>Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="MD ROCKY" required>
                </div>
                <div>
                    <label>Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register Account</button>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgotForm" class="form-box">
                <h3 style="margin-bottom: 15px; color: var(--primary-cyan);">Reset Password</h3>
                <p style="font-size: 13px; color: var(--text-sub); margin-bottom: 15px;">Enter your registered email address to receive a password reset link.</p>
                <div>
                    <label>Email Address</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="switchTab('login')" style="color: var(--text-sub); font-size: 13px; text-decoration: none;">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- JS for Tab Switching -->
    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-box').forEach(form => form.classList.remove('active'));

            if(tabName === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else if(tabName === 'register') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            } else if(tabName === 'forgot') {
                document.getElementById('forgotForm').classList.add('active');
            }
        }
    </script>

    <!-- Connect Firebase Auth Logic -->
    <script type="module" src="app.js"></script>

</body>
</html>
